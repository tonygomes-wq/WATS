; Configuração PHP Personalizada - WATS
; MACIP Tecnologia LTDA

; ✅ TIMEZONE - FORÇAR HORÁRIO DE BRASÍLIA
date.timezone = "America/Sao_Paulo"

; Limites de upload
upload_max_filesize = 10M
post_max_size = 10M
max_execution_time = 30
max_input_time = 30
memory_limit = 128M

; Segurança
expose_php = Off
display_errors = Off
log_errors = On
